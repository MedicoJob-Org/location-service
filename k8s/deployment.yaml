apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
      - name: location-service
        image: ghcr.io/your-org/location-service:latest
        ports:
        - containerPort: 5005
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: location-service
spec:
  selector:
    app: location-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5005
